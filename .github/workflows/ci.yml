name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dtsc_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/dtsc_test?schema=public
      NEXTAUTH_SECRET: ci-secret-only
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OTP_BYPASS_CODE: "123456"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dtsc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dtsc_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/dtsc_test?schema=public
      NEXTAUTH_SECRET: ci-secret-only
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OTP_BYPASS_CODE: "123456"
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dtsc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run db:seed
      - run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Start app
        run: npm run start &
      - name: Wait for app
        run: npx wait-on http://localhost:3000/en --timeout 60000
      - name: Run Playwright
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
